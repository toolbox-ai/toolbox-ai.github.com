    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-color: #6366f1;
            --accent-hover: #4f46e5;
            --border-color: #334155;
            --tag-free: #10b981;
            --tag-premium: #f59e0b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s ease;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            padding-bottom: 60px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        header {
            border-bottom: 1px solid var(--border-color);
            padding: 20px 0;
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
            background-color: rgba(15, 23, 42, 0.8);
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -1px;
            color: var(--text-main);
            text-decoration: none;
        }

        .logo span {
            color: var(--accent-color);
        }

        .lang-btn {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
        }

        .lang-btn:hover {
            border-color: var(--accent-color);
        }

        .hero {
            text-align: center;
            padding: 60px 0 40px 0;
        }

        .hero h1 {
            font-size: 42px;
            font-weight: 800;
            margin-bottom: 15px;
            letter-spacing: -1px;
        }

        .hero p {
            color: var(--text-muted);
            font-size: 18px;
            margin-bottom: 30px;
        }

        .search-wrapper {
            position: relative;
            max-width: 600px;
            margin: 0 auto;
        }

        .search-wrapper i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 18px;
        }

        .search-bar {
            width: 100%;
            padding: 16px 20px 16px 55px;
            background-color: var(--bg-card);
            border: 2px solid var(--border-color);
            border-radius: 14px;
            color: var(--text-main);
            font-size: 16px;
            outline: none;
        }

        .search-bar:focus {
            border-color: var(--accent-color);
        }

        .section-title {
            font-size: 22px;
            font-weight: 700;
            margin: 40px 0 20px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title i {
            color: #ef4444;
        }

        .featured-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .categories {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 10px;
            margin-bottom: 30px;
        }

        .cat-btn {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 500;
            white-space: nowrap;
        }

        .cat-btn:hover, .cat-btn.active {
            background-color: var(--accent-color);
            color: var(--text-main);
            border-color: var(--accent-color);
        }

        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .tool-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 220px;
        }

        .tool-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent-color);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
            gap: 10px;
        }

        .tool-name {
            font-size: 18px;
            font-weight: 600;
        }

        .tool-cat-tag {
            font-size: 11px;
            background-color: rgba(99, 102, 241, 0.15);
            color: var(--accent-color);
            padding: 4px 8px;
            border-radius: 6px;
            font-weight: 600;
            white-space: nowrap;
        }

        .tool-desc {
            color: var(--text-muted);
            font-size: 14px;
            line-height: 1.5;
            overflow: hidden;
            margin-bottom: 15px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .price-tag {
            font-size: 12px;
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 6px;
        }

        .price-tag.free {
            background-color: rgba(16, 185, 129, 0.15);
            color: var(--tag-free);
        }

        .price-tag.premium {
            background-color: rgba(245, 158, 11, 0.15);
            color: var(--tag-premium);
        }

        .go-btn {
            color: var(--text-muted);
            font-size: 14px;
        }

        .tool-card:hover .go-btn {
            color: var(--accent-color);
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
            opacity: 0;
            pointer-events: none;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-box {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            width: 90%;
            max-width: 550px;
            border-radius: 20px;
            padding: 30px;
            position: relative;
            transform: scale(0.9);
        }

        .modal-overlay.active .modal-box {
            transform: scale(1);
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 22px;
            cursor: pointer;
        }

        .modal-title {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .modal-meta {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .modal-desc {
            color: var(--text-muted);
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .visit-btn {
            display: block;
            width: 100%;
            text-align: center;
            background-color: var(--accent-color);
            color: var(--text-main);
            padding: 14px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
        }

        .visit-btn:hover {
            background-color: var(--accent-hover);
        }

        .no-results {
            text-align: center;
            color: var(--text-muted);
            padding: 40px;
            display: none;
            width: 100%;
        }
    </style>
</head>

            { id: 2, name: "Midjourney", cat: "design", isFeatured: true, price: "Paid", url: "https://www.midjourney.com", trDesc: "Verilen metin açıklamalarından (prompt) bütüleyici, sinematik ve ultra gerçekçi görseller üreten tasarım aracı.", enDesc: "Design tool that generates stunning, cinematic, and ultra-realistic images from text descriptions." },
            { id: 3, name: "Runway Gen-3", cat: "video", isFeatured: true, price: "Freemium", url: "https://runwayml.com", trDesc: "Yazılan metinleri veya yüklenen fotoğrafları yüksek kaliteli yapay zeka videolarına dönüştüren sinematik video aracı.", enDesc: "Cinematic video tool that transforms written text or uploaded photos into high-quality AI videos." },
            { id: 4, name: "ElevenLabs", cat: "audio", isFeatured: true, price: "Freemium", url: "https://elevenlabs.io", trDesc: "İnsan sesinden ayırt edilemeyecek kadar doğal ve duygulu seslendirmeler, metinden sese dönüşümler yapan sistem.", enDesc: "System providing lifelike text-to-speech and voice cloning indistinguishable from real human voices." },
            { id: 5, name: "Suno AI", cat: "audio", isFeatured: false, price: "Freemium", url: "https://suno.com", trDesc: "Saniyeler içinde yazdığın tarza ve sözlere göre tamamen telifsiz, vokal içeren profesyonel şarkılar üretir.", enDesc: "Generates completely royalty-free, vocal-included professional songs in seconds based on your lyrics and style." },
            { id: 6, name: "Claude", cat: "text", isFeatured: false, price: "Freemium", url: "https://claude.ai", trDesc: "Özellikle uzun metin analizleri, kitap özetleri ve mantıksal kod yazımında üstün başarı gösteren yapay zeka modeli.", enDesc: "An AI model showing superior performance especially in long text analysis, book summaries, and logical coding." },
            { id: 7, name: "v0 by Vercel", cat: "code", isFeatured: false, price: "Freemium", url: "https://v0.dev", trDesc: "Sadece ne istediğini yazarak modern web siteleri arayüzleri ve React kodları üreten kodlama asistanı.", enDesc: "Coding assistant that generates modern website interfaces and React code just by describing what you want." },
            { id: 8, name: "CapCut AI", cat: "video", isFeatured: false, price: "Free", url: "https://www.capcut.com", trDesc: "Otomatik altyazı ekleme, video akıllandırma ve sosyal medya şablonları sunan yapay zeka destekli video editörü.", enDesc: "AI-powered video editor offering auto-captions, smart background removal, and trendy social media templates." },
            { id: 9, name: "Cursor", cat: "code", isFeatured: false, price: "Freemium", url: "https://www.cursor.com", trDesc: "Yazılımcıların kodları çok daha hızlı yazmasını, hataları otomatik bulmasını sağlayan yeni nesil yapay zeka kod editörü.", enDesc: "Next-generation AI code editor designed for engineers to write code faster and auto-fix bugs." },
            { id: 10, name: "Leonardo AI", cat: "design", isFeatured: false, price: "Freemium", url: "https://leonardo.ai", trDesc: "Oyun varlıkları, 3D modeller ve sanatsal harika görseller üretmek için muazzam kontrol sunan tasarım paneli.", enDesc: "Design platform providing immense control for creating game assets, 3D textures, and artistic images." },
            { id: 11, name: "Sora by OpenAI", cat: "video", isFeatured: false, price: "Paid", url: "https://openai.com/sora", trDesc: "Karmaşık sahnelere ve canlı kamera hareketlerine sahip, kelimelerden ultra gerçekçi 1 dakikalık videolar üreten devrimsel model.", enDesc: "Revolutionary model creating ultra-realistic 1-minute videos with complex scenes and vibrant camera motions from words." },
            { id: 12, name: "Udio", cat: "audio", isFeatured: false, price: "Freemium", url: "https://www.udio.com", trDesc: "İstediğin müzik tarzında, stüdyo kalitesinde vokaller ve muazzam enstrümantal altyapılarla tam uzunlukta şarkılar oluşturan yapay zeka.", enDesc: "AI creating full-length songs with studio-quality vocals and massive instrumental backings in any music genre." },
            { id: 13, name: "Perplexity AI", cat: "text", isFeatured: false, price: "Freemium", url: "https://www.perplexity.ai", trDesc: "Geleneksel arama motorlarının yerini alan, interneti anlık tarayıp kaynak göstererek sorularına doğrudan cevap veren bilgi motoru.", enDesc: "Information engine replacing traditional search engines by scanning the web in real-time and answering with citations." },
            { id: 14, name: "Canva AI", cat: "design", isFeatured: false, price: "Freemium", url: "https://www.canva.com", trDesc: "Görsel genişletme, fotoğraftan nesne silme ve metinden tasarım oluşturma gibi akıllı araçlar sunan popüler grafik paneli.", enDesc: "Popular graphic dashboard offering smart tools like image expansion, object removal, and text-to-design." },
            { id: 15, name: "GitHub Copilot", cat: "code", isFeatured: false, price: "Paid", url: "https://github.com/features/copilot", trDesc: "Sen kod yazarken bir sonraki satırları tahmin eden, fonksiyonları otomatik tamamlayan dünyanın en çok kullanılan kod ortağı.", enDesc: "The world's most used coding partner predicting your next lines and auto-completing functions as you type." },
            { id: 16, name: "Luma Dream Machine", cat: "video", isFeatured: false, price: "Freemium", url: "https://lumalabs.ai/dream-machine", trDesc: "Yazılardan veya görsellerden fizik kurallarına son derece uyumlu, hızlı ve yüksek kaliteli sinematik videolar üreten yapay zeka.", enDesc: "AI creating fast, high-quality cinematic videos from text or images with great adherence to physics rules." },

            { id: 18, name: "DeepL Translate", cat: "text", isFeatured: false, price: "Freemium", url: "https://www.deepl.com", trDesc: "Sıradan çeviri sitelerinin aksine, cümleleri yapay zeka ile yerel dildeki anlamlarına ve bağlamına en uygun şekilde çeviren sistem.", enDesc: "System translating sentences using AI, matching local idioms and contexts perfectly, unlike ordinary translation sites." },
            { id: 19, name: "Phind", cat: "code", isFeatured: false, price: "Freemium", url: "https://www.phind.com", trDesc: "Özellikle yazılımcılar için geliştirilmiş, kodlama sorularına doğrudan çalışan kod blokları ve çözümler üreten arama motoru.", enDesc: "A search engine built for developers, providing working code blocks and direct solutions to programming queries." },
            { id: 20, name: "Adobe Firefly", cat: "design", isFeatured: false, price: "Freemium", url: "https://www.adobe.com/firefly", trDesc: "Telif hakkı içermeyen güvenli verilerle eğitilmiş, Photoshop entegreli gelişmiş nesne ekleme ve görsel üretim modeli.", enDesc: "Advanced image generation and object insertion model trained on copyright-safe data, integrated with Photoshop." },
            { id: 21, name: "Gemini", cat: "text", isFeatured: true, price: "Freemium", url: "https://gemini.google.com", trDesc: "Siteni uçuran, takıldığın her hatayı anında çözen ve her daim arkanda olan yapay zeka kankan.", enDesc: "Your ultimate AI sidekick that helps build your site, fixes errors instantly, and always has your back." },
        ];

        function initSite() {
            renderLanguageStrings();
            renderCategories();
            renderCards();
        }

        function renderLanguageStrings() {
            const lang = translations[currentLang];
            document.getElementById('langBtn').innerText = currentLang === 'tr' ? 'EN' : 'TR';
            document.getElementById('heroTitle').innerText = lang.heroTitle;
            document.getElementById('heroSubtitle').innerText = lang.heroSubtitle;
            document.getElementById('searchBar').placeholder = lang.searchPlaceholder;
            document.getElementById('noResults').innerText = lang.noResults;
        }

        function renderCategories() {
            const container = document.getElementById('categoriesContainer');
            const lang = translations[currentLang];
            const cats = ['all', 'video', 'audio', 'text', 'design', 'code'];
            
            container.innerHTML = cats.map(cat => `
                <button class="cat-btn ${selectedCategory === cat ? 'active' : ''}" onclick="setCategory('${cat}')">
                    ${lang[cat]}
                </button>
            `).join('');
        }

        function renderCards() {
            const featuredContainer = document.getElementById('featuredContainer');
            const toolsContainer = document.getElementById('toolsContainer');
            const searchVal = document.getElementById('searchBar').value.toLowerCase();
            const lang = translations[currentLang];

            let featuredHtml = '';
            let toolsHtml = '';
            let visibleToolsCount = 0;

            toolsData.forEach(tool => {
                const title = tool.name.toLowerCase();
                const desc = (currentLang === 'tr' ? tool.trDesc : tool.enDesc).toLowerCase();
                
                const matchesSearch = title.includes(searchVal) || desc.includes(searchVal);
                const matchesCat = selectedCategory === 'all' || tool.cat === selectedCategory;

                const cardHtml = `
                    <div class="tool-card" onclick="openModal(${tool.id})">
                        <div class="card-header">
                            <div class="tool-name">${tool.name}</div>
                            <span class="tool-cat-tag">${lang[tool.cat]}</span>
                        </div>
                        <div class="tool-desc">${currentLang === 'tr' ? tool.trDesc : tool.enDesc}</div>
                        <div class="card-footer">
                            <span class="price-tag ${tool.price === 'Free' ? 'free' : 'premium'}">${tool.price}</span>
                            <span class="go-btn"><i class="fa-solid fa-arrow-right"></i></span>
                        </div>
                    </div>
                `;

                if (tool.isFeatured && searchVal === '' && selectedCategory === 'all') {
                    featuredHtml += cardHtml;
                }

                if (matchesSearch && matchesCat) {
                    toolsHtml += cardHtml;
                    visibleToolsCount++;
                }
            });

            if (searchVal !== '' || selectedCategory !== 'all') {
                document.getElementById('featuredTitle').style.display = 'none';
                featuredContainer.style.display = 'none';
            } else {
                document.getElementById('featuredTitle').style.display = 'flex';
                featuredContainer.style.display = 'grid';
                featuredContainer.innerHTML = featuredHtml;
            }

            if (visibleToolsCount === 0) {
                document.getElementById('noResults').style.display = 'block';
                toolsContainer.innerHTML = '';
            } else {
                document.getElementById('noResults').style.display = 'none';
                toolsContainer.innerHTML = toolsHtml;
            }
        }

        function setCategory(cat) {
            selectedCategory = cat;
            renderCategories();
            renderCards();
        }

        function filterTools() {
            renderCards();
        }

        function toggleLanguage() {
            currentLang = currentLang === 'tr' ? 'en' : 'tr';
            initSite();
        }

        function openModal(id) {
            const tool = toolsData.find(t => t.id === id);
            if (!tool) return;

            const lang = translations[currentLang];
            document.getElementById('modalTitle').innerText = tool.name;
            document.getElementById('modalCat').innerText = lang[tool.cat];
            document.getElementById('modalPrice').innerText = tool.price;
            document.getElementById('modalDesc').innerText = currentLang === 'tr' ? tool.trDesc : tool.enDesc;
            
            const linkBtn = document.getElementById('modalLink');
            linkBtn.href = tool.url;
            linkBtn.innerHTML = `${lang.visitBtn} <i class="fa-solid fa-arrow-up-right-from-square"></i>`;

            const priceEl = document.getElementById('modalPrice');
            priceEl.className = `price-tag ${tool.price === 'Free' ? 'free' : 'premium'}`;

            document.getElementById('modalOverlay').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
        }

        window.onload = initSite;
    </script>
</body>
</html>
